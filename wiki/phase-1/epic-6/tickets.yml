tickets:
  - id: E6-T001
    meta:
      title: "Communication Types & Interface Refinement"
      description: |
        Refine E0 stub interfaces for real implementation. Define all types needed across the
        Communication subsystem: ParsedInput, ResponseGenerationContext, TheaterCheck, PersonModel,
        ConversationThread, LlmContextBlock, and supporting types.

        This ticket grounds all subsequent work. Every other ticket imports from these types.

        Deliverables:
        - Refined ICommunicationService interface with full method signatures
        - Refined IInputParserService with ParsedInput return type
        - Refined IPersonModelingService with PersonModel type
        - Refined ITheaterValidator with TheaterCheck type
        - Refined ILlmService with cost tracking types (LlmCallResult, LlmCostReport)
        - ResponseGenerationContext type (drive state + WKG context + person model + episodes)
        - InputIntent enum (QUESTION, STATEMENT, CORRECTION, COMMAND, ACKNOWLEDGMENT, TEACHING)
        - GuardianFeedbackType enum (CONFIRMATION, CORRECTION, TEACHING, NONE)
        - ConversationThread type with message history and topic tracking
        - Communication event types for TimescaleDB emission
        - DriveNarrative construction types

        Acceptance criteria:
        - All types compile with strict TypeScript
        - Every type has JSDoc explaining its CANON relevance
        - ParsedInput includes guardianFeedbackType for Guardian Asymmetry (Immutable Standard 5)
        - ResponseGenerationContext includes driveState field (Theater Prohibition, Standard 1)
        - LlmCostReport includes latency and token count for Type 2 cost tracking
        - All provenance-carrying types include ProvenanceSource field
      acceptance_criteria:
        - "All interfaces compile with npx tsc --noEmit"
        - "Every type has JSDoc with CANON reference"
        - "ParsedInput includes guardianFeedbackType field"
        - "ResponseGenerationContext includes driveState: DriveSnapshot"
        - "LlmCostReport tracks latency_ms and token_count"
        - "No use of 'any' type"
