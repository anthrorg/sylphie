# Jim Decisions Required (from canon.md)

Before implementation, Jim must decide on six critical gaps:

1. **WKG Three-Level Structure** (Concept/Procedure/Instance)
   - Current E3: not explicitly modeled
   - Option A: Use separate node labels (Concept, Procedure, Instance)
   - Option B: Single WkgNode with type property
   - Recommended: Option B (simpler, is_instance flag suffices)

2. **Guardian Confirmation Mechanic**
   - Option A: Update provenance to GUARDIAN
   - Option B: Store provenance_confirmed flag
   - Option C: Increment retrieval_count by 3x (preserve provenance, boost weight)
   - Recommended: Option C (preserves lesion test, enables asymmetry)

3. **Success Definition for Retrieval-and-Use**
   - Current: Decision Making does not emit USE_SUCCESS events
   - Required: Define what constitutes "use + success" for confidence increment
   - Decision: Does Decision Making emit outcome, or does Learning infer success from prediction accuracy?

4. **Contradiction Resolution**
   - Option A: Block updates on contradiction (reject conflicting edge)
   - Option B: Flag and proceed (store CONTRADICTS edge, write succeeds)
   - Recommended: Option B (per Piaget: contradictions are growth signals)

5. **Self-Evaluation Protocol (CANON A.8)**
   - Currently reserved in CANON
   - Required: Jim specification before E4 (Drive Engine) can read Self KG

6. **Knowledge Domain Structure (CANON A.9)**
   - Option A: Flat (all entities in single WKG)
   - Option B: Partitioned (domains: "physical world", "social", "self", "procedural")
   - Decision: Affects queryContext() scope and Learning partition strategy

