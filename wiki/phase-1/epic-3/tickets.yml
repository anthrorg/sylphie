  - id: E3-T003
    meta:
      title: "Neo4j World Knowledge Graph (WKG) foundation"
      description: |
        Implement the real Neo4j WKG with constraints, indexes, and WkgService skeleton.
        Per Sentinel: This is the performance-critical tier. Indexes and schema design
        decisions made here determine downstream query latency.

        Deliverables:
        - src/knowledge/services/wkg/wkg.schema.ts
          * Neo4j initialization script: CREATE CONSTRAINTS, CREATE INDEXES
          * Constraint: WkgNode.id is unique
          * Constraint: No duplicate edges (from, to, type must be composite key)
          * Index: (confidence) for confidence filtering queries
          * Index: (provenance) for provenance auditing
          * Index: (created_at) for temporal range queries
          * Index: (label) full-text for LLM context search
          * Index: composite (from, to, type) for edge lookup
          * Documentation: Index rationale for each index

        - src/knowledge/services/wkg/wkg.service.ts
          * WkgService @Injectable() implementing IWkgService
          * Inject NEO4J_DRIVER from E1-T005 (bootstrap in OnModuleInit)
          * Skeleton methods (filled in T004–T006):
            - upsertNode(node): Promise<WkgNode>
            - findNode(id): Promise<WkgNode | null>
            - upsertEdge(edge): Promise<WkgEdge>
            - queryEdges(filter): Promise<WkgEdge[]>
            - checkContradiction(nodeA, nodeB): Promise<Contradiction | null>
            - queryContext(nodeId, depth): Promise<subgraph>
            - recordRetrievalAndUse(nodeId): Promise<void>
          * OnModuleInit: verify Neo4j connection, run schema migration
          * OnModuleDestroy: close driver gracefully
          * Logger: inject @Logger() from NestJS

        - src/knowledge/services/wkg/wkg.queries.ts
          * Query builders (functions returning parameterized Cypher)
          * UPSERT node query template
          * UPSERT edge query template
          * CHECK contradiction query template
          * These are NOT executed here; just builder functions

        - src/knowledge/services/wkg/wkg.errors.ts
          * InvalidProvenanceError
          * ConfidenceCeilingError
          * SchemaModificationError
          * ContradictionDetectedError (not fatal; used for signaling)

        Per Atlas: Provenance validation happens at service layer, not database.
        Per Sentinel: All queries must be parameterized (SQL injection safe).
        Per Canon: Provenance is immutable and auditable.

      acceptance_criteria:
        - "Neo4j schema migration script created and documented"
        - "All 7 constraints and indexes created in OnModuleInit"
        - "WkgService injects NEO4J_DRIVER and verifies connection"
        - "All 6 interface methods present (filled with NotImplementedError)"
        - "3 error classes defined in wkg.errors.ts"
        - "Query builders created in wkg.queries.ts (not executed)"
        - "OnModuleInit creates missing indexes on first boot"
        - "OnModuleDestroy closes driver gracefully"
        - "Integration test: services boot, schema created, health check passes"
        - "Neo4j constraint verification: duplicate nodes rejected"
        - "npx tsc --noEmit passes"

