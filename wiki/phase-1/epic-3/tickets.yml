epic: 3
title: "Knowledge Module (WKG + Self KG + Other KG)"
phase: 1
created: 2026-03-29
status: planned

# Synthesized from 5 agent analyses: Atlas (schema design), Forge (NestJS architecture), Sentinel (persistence),
# Canon (CANON compliance), Science (Piaget+Ashby developmental risks).
#
# Key decisions incorporated:
# - Single WkgNode label with `is_instance` flag to distinguish ABox/TBox (Atlas + Sentinel)
# - Grafeo risk is HIGH: needs technology spike first, with SQLite+Cypher fallback (Sentinel)
# - Confidence computed lazily on read, not eagerly on write (Sentinel + Atlas)
# - Provenance enforced at service layer with type-safe guards (Forge + Atlas)
# - Contradiction detection stores CONTRADICTS edges, doesn't block writes (Atlas + Science)
# - KG isolation through separate service classes and separate Grafeo instances (Forge + Atlas)
# - queryContext() uses bounded subgraph traversal for LLM context assembly (Atlas)
# - Events emitted for knowledge mutations via injected IEventService (Forge)
# - Guardian Asymmetry (2x/3x) applied as multiplier on retrieval_count increment (Atlas + Canon)
# - Self KG schema includes: capabilities, drive_patterns, prediction_accuracy, behavioral_patterns (Atlas + Science)
# - Contradictions are developmental catalysts, not errors (Science/Piaget)
#
# CRITICAL: Six decisions pending Jim input (listed in canon.md) must be resolved before implementation:
# 1. WKG three-level structure (Concept/Procedure/Instance) — data model representation
# 2. Guardian confirmation mechanic — Option C (2x/3x weight on retrieval_count) preferred
# 3. Success definition for retrieval-and-use tracking — USE_SUCCESS events required from Decision Making
# 4. Contradiction resolution — Flag and proceed (preferred) or block and reject
# 5. Self-Evaluation Protocol (CANON A.8) — Jim specification required
# 6. Knowledge Domain Structure (CANON A.9) — Flat or partitioned model

tickets:
  - id: E3-T001
    meta:
      title: "Grafeo technology spike and fallback planning"
      description: |
        Validate Grafeo viability for Self KG and Other KG implementations.
        Grafeo is a pre-1.0 (v0.5.28) embedded graph database with a single maintainer.
        This is the highest technical risk in Epic 3. A spike must determine whether Grafeo
        is production-ready or if fallback migration is needed before full implementation.

        Scope:
        - Create a test Grafeo instance in NestJS (embedded, not network service)
        - Write 10 test SelfConcept nodes with confidence/provenance metadata
        - Query via Cypher subset: basic MATCH, WHERE, SET operations
        - Test persistence and recovery (restart NestJS, verify data intact)
        - Measure memory footprint (SelfKgService + 5 concurrent OtherKgService instances)
        - Document all Cypher operations supported vs. unsupported
        - Identify any crashes, data corruption, or severe performance issues
        - Create decision checklist: blockers vs. acceptable limitations

        Deliverables:
        - Test implementation in src/knowledge/services/grafeo-spike/
        - Spike report: spike-report.md documenting findings, risks, recommended path
        - If blockers found: detailed migration plan to Plan B (SQLite + Cypher dialect)
        - Decision checklist for Jim: "Is Grafeo acceptable?" with specific risks listed

        Plan B Alternatives (if Grafeo unsuitable):
        - Option 1: SQLite with Cypher dialect (lighter weight, more mature)
        - Option 2: In-memory graph store (acceptable for Phase 1 prototype only)
        - Option 3: Split Self/Other KGs to Neo4j (less isolation, but proven)

        Migration strategy (if Plan B triggered):
        - Extract Grafeo data as JSON (preserve all metadata)
        - Implement ISelfKgService against new backend
        - Swap underlying store (code interfaces remain identical)
        - Run full test suite against new store
        - No delays to downstream epics (E4–E8) if Plan B needed

        CRITICAL: This ticket is a true spike. It must NOT block tickets T002–T010.
        If Grafeo proves viable, proceed to T003+ immediately. If not, Jim decides
        Plan B path and T007–T008 are adapted accordingly.

      acceptance_criteria:
        - "Grafeo instance created and tests written in <4 hours"
        - "10 test nodes persisted and queried successfully"
        - "Cypher support matrix documented (operations supported/unsupported)"
        - "Memory footprint measured with 5 concurrent instances"
        - "Persistence verified: data survives NestJS restart"
        - "No data corruption or crashes observed in 30-minute stress test"
        - "spike-report.md completed with blockers and acceptable limitations"
        - "Decision checklist provided for Jim"
        - "If blockers found: detailed Plan B migration plan documented"
        - "npx tsc --noEmit passes (spike code)"

    agents: [sentinel, forge]
    model: sonnet
    dependencies: []
    complexity: M

  - id: E3-T002
    meta:
      title: "Knowledge types and shared schemas (TypeScript)"
      description: |
        Define the complete TypeScript type system for all three knowledge graphs.
        This is the foundational contract that all other E3 tickets build on.

        Per Forge: All types must be defined before services; types drive interface design
        and enforce isolation at compile time.

        Deliverables:
        - src/knowledge/types/wkg.types.ts
          * WkgNode interface (id, label, description, is_instance flag, confidence, base_confidence,
            provenance, created_at, updated_at, last_retrieved, retrieval_count)
          * WkgEdge interface (from, to, type, confidence, base_confidence, provenance,
            timestamp, is_contradictory flag)
          * WkgNodeType union (Entity, Concept, Procedure)
          * WkgEdgeType union (RELATES_TO, INSTANCE_OF, HAS_PROPERTY, HAS_PRECONDITION,
            HAS_EFFECT, CONTRADICTS)
          * ProvenanceSource enum (SENSOR, GUARDIAN, LLM_GENERATED, INFERENCE)
          * PROVENANCE_BASE_CONFIDENCE mapping (SENSOR: 0.40, GUARDIAN: 0.60, etc.)
          * CONFIDENCE_THRESHOLDS constants (RETRIEVAL: 0.50, GRADUATION: 0.80, CEILING: 0.60)
          * Default decay rates per provenance
          * WkgQueryFilter, WkgUpsertOptions, WkgEdgeQueryOptions DTOs

        - src/knowledge/types/self-kg.types.ts
          * SelfConcept interface (id, label, type: "capability" | "drive_pattern" |
            "prediction_accuracy" | "behavioral_pattern", confidence, provenance, timestamp)
          * SelfEdgeType union (ENABLES, UNDERMINES, PREDICTS, CORRELATES_WITH, CONFLICTS_WITH)
          * SelfConflict interface (id, type, nodes[], severity, timestamp)
          * SelfKgQueryFilter DTO

        - src/knowledge/types/other-kg.types.ts
          * PersonConcept interface (id, label, type, confidence, provenance, timestamp)
          * PersonEdgeType union (HAS_TRAIT, BELIEVES, PREFERS, FEARS, ENJOYS, INCONSISTENT_WITH)
          * PersonModel interface (person_id, created_at, last_updated, conflicts[])
          * PersonQueryFilter DTO

        - src/knowledge/types/confidence.types.ts
          * ConfidenceUpdate interface (node_id, old_confidence, new_confidence, reason,
            retrieval_count_delta, guardian_weighted)
          * ACT-R formula parameters (base, d decay)

        - src/knowledge/types/contradiction.types.ts
          * Contradiction interface (id, type: "factual" | "logical" | "temporal" |
            "provenance_conflict" | "confidence_conflict", nodes, severity, timestamp)
          * ContradictionEdge DTO for Neo4j storage

        - src/knowledge/types/events.ts
          * Knowledge-specific event types: KNOWLEDGE_NODE_UPSERTED, KNOWLEDGE_EDGE_UPSERTED,
            CONTRADICTION_DETECTED, KNOWLEDGE_RETRIEVAL_AND_USE, SELF_CONCEPT_UPDATED,
            PERSON_CONCEPT_UPDATED

        Per Canon: Provenance is never updated or erased (immutable on record).
        Per Atlas: Confidence is computed lazily on read (not eagerly on write).

      acceptance_criteria:
        - "All WKG types defined in wkg.types.ts"
        - "All Self KG types defined in self-kg.types.ts"
        - "All Other KG types defined in other-kg.types.ts"
        - "ProvenanceSource enum has 4 values (SENSOR, GUARDIAN, LLM_GENERATED, INFERENCE)"
        - "PROVENANCE_BASE_CONFIDENCE has correct mappings (SENSOR: 0.40, GUARDIAN: 0.60, etc.)"
        - "CONFIDENCE_THRESHOLDS defined and immutable"
        - "is_instance flag present on WkgNode (distinguishes ABox/TBox)"
        - "Contradiction interface supports all 5 contradiction types"
        - "All DTOs have optional fields where appropriate"
        - "Knowledge event types defined in events.ts"
        - "npx tsc --noEmit passes"

