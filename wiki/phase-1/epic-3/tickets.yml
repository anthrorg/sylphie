# Risks and Mitigations

## Risk 1: Grafeo Pre-1.0 Status (CRITICAL)
**Mitigation:** E3-T001 (technology spike) validates viability before full implementation.
If Grafeo blocked, E3-T007–T008 adapted to Plan B within same epic.

## Risk 2: Confidence Dynamics Complexity
**Mitigation:** ACT-R formula is pure function (testable). ConfidenceService (T005)
provides exhaustive unit tests before integration.

## Risk 3: Contradiction Handling
**Mitigation:** Per Science (Piaget), contradictions are signals, not errors.
T004 ensures writes proceed despite contradictions; Learning (E7) analyzes them.

## Risk 4: Provenance Immutability vs. Guardian Asymmetry
**Mitigation:** Per Canon analysis, Option C preserves immutability while enabling 3x weight.
Provenance never changes; retrieval_count incremented by 3x for guardian-confirmed knowledge.

## Risk 5: Cross-Graph Isolation Breaches
**Mitigation:** Type system enforces isolation (SelfKgService only accepts SelfConcept).
Integration tests (T010) verify complete isolation; no cross-contamination.

