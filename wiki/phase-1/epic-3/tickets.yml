  - id: E3-T004
    meta:
      title: "WKG edge operations and contradiction detection"
      description: |
        Implement upsertEdge() and checkContradiction() — the write path for relationships
        and the contradiction detection pipeline.

        Implementation (upsertEdge):
        - Accept WkgEdge with confidence, provenance, base_confidence
        - Validate provenance source exists
        - Enforce confidence ceiling: confidence <= CEILING (0.60) when retrieval_count === 0
        - Check if edge already exists (by composite key: from + to + type)
        - If exists: UPDATE metadata, increment last_updated, recompute confidence
        - If new: CREATE with base_confidence, confidence, provenance, timestamp
        - Call checkContradiction() before write
        - Emit KNOWLEDGE_EDGE_UPSERTED event to TimescaleDB
        - Return created/updated WkgEdge

        Per Science (Piaget): Contradictions are developmental catalysts, not errors.
        Proceed with write even if contradiction detected; flag it for Learning to analyze.

        Implementation (checkContradiction):
        - Accept two nodes or node pair from edge context
        - Query Neo4j: find all edges between nodes of opposite polarity
          (A -[RELATES_TO]-> B vs. A -[CONTRADICTS]-> B)
        - For each contradiction candidate: compute severity (confidence difference)
        - If severity > threshold (0.20): return Contradiction object
        - Store contradiction as CONTRADICTS edge in Neo4j
        - Emit CONTRADICTION_DETECTED event to TimescaleDB (for Learning analysis)
        - Do NOT block the original write
        - Track contradiction count on losing edge (optional: downweight its confidence)

        Contradiction types (per Atlas):
        - FACTUAL: "color=red" contradicts "color=blue" (same property, opposite values)
        - LOGICAL: A contradicts B logically (e.g., "cannot be both X and Y")
        - TEMPORAL: "happened on 2025-01-01" contradicts "happened on 2025-02-01"
        - PROVENANCE_CONFLICT: GUARDIAN says A, multiple SENSOR say ¬A
        - CONFIDENCE_CONFLICT: High-confidence A contradicts high-confidence B

        Per Canon: Contradictions must enable lesion test (provenance auditable).
        Store contradiction metadata: both nodes, both confidences, severity, discovered_by.

      acceptance_criteria:
        - "upsertEdge() accepts typed WkgEdge with confidence, provenance"
        - "Validates provenance source against enum"
        - "Enforces confidence ceiling (0.60) for untested knowledge"
        - "Detects existing edges by composite key (from, to, type)"
        - "Updates metadata on existing edge, creates new edge if not found"
        - "checkContradiction() identifies all contradiction types"
        - "Contradiction severity computed (confidence difference)"
        - "Contradictions stored as CONTRADICTS edges in Neo4j"
        - "KNOWLEDGE_EDGE_UPSERTED event emitted with full metadata"
        - "CONTRADICTION_DETECTED event emitted with severity and type"
        - "Integration test: upsert 5 edges, query shows all stored"
        - "Integration test: detect factual contradiction (color=red vs. color=blue)"
        - "Integration test: contradiction doesn't block write"
        - "Performance: upsertEdge() <20ms p99"
        - "npx tsc --noEmit passes"

    agents: [atlas, sentinel, forge]
    model: sonnet
    dependencies: [E3-T003]
    complexity: L

  - id: E3-T005
    meta:
      title: "ConfidenceService (ACT-R wrapper and retrieval tracking)"
      description: |
        Implement ConfidenceService — the confidence computation engine that wraps
        the ACT-R formula and enforces the Confidence Ceiling (Immutable Standard 3).

        ACT-R Formula:
        confidence(t) = min(1.0, base + 0.12 * ln(count) - d * ln(hours_elapsed + 1))

        Where:
        - base = PROVENANCE_BASE_CONFIDENCE[provenance] (SENSOR: 0.40, GUARDIAN: 0.60, etc.)
        - count = retrieval_count (incremented on successful use)
        - d = DEFAULT_DECAY_RATES[provenance]
        - hours_elapsed = now - last_retrieved

        Per Atlas: Confidence is COMPUTED LAZILY on read, not eagerly on every write.
        This keeps write path fast; reads pay the computation cost.

        Implementation:
        - computeConfidence(node): Promise<number>
          * Fetch node from Neo4j (with base_confidence, provenance, retrieval_count, last_retrieved)
          * Apply ACT-R formula
          * Clamp result to [0.0, 1.0]
          * Return computed confidence
          * Do NOT update node in database (lazy computation)

        - enforceConfidenceCeiling(nodeId, proposedConfidence, provenance): Promise<void>
          * Get PROVENANCE_BASE_CONFIDENCE[provenance]
          * If proposedConfidence > base AND retrieval_count === 0:
            throw ConfidenceCeilingError
          * If provenance === LLM_GENERATED AND proposedConfidence > 0.35:
            throw ConfidenceCeilingError (LLM starts low)

        - recordRetrievalAndUse(nodeId, successOutcome?): Promise<void>
          * Increment retrieval_count by 1 (or by weight if Guardian confirmation)
          * Update last_retrieved timestamp
          * Emit KNOWLEDGE_RETRIEVAL_AND_USE event to TimescaleDB
          * If successOutcome provided: increment success_count (for MAE tracking)
          * Per Canon Guardian Asymmetry: if guardian confirmed this knowledge,
            increment retrieval_count by 3x (not 1x)

        - getConfidenceDebugInfo(nodeId): Promise<DebugInfo>
          * Return {
              base_confidence,
              provenance,
              retrieval_count,
              last_retrieved,
              hours_elapsed,
              computed_confidence,
              confidence_ceiling,
              is_at_ceiling,
              decay_rate,
              ln_count_term,
              ln_time_term
            }
          * Useful for debugging confidence dynamics

        Per Atlas: Enforce SHRUG_THRESHOLD (0.50) — if no knowledge exceeds this,
        Decision Making should shrug (signal incomprehension) rather than guess.

      acceptance_criteria:
        - "ACT-R formula implemented with all parameters"
        - "Confidence computed lazily on read (no eager updates)"
        - "Confidence clamped to [0.0, 1.0]"
        - "Confidence ceiling enforced: base confidence if retrieval_count === 0"
        - "LLM_GENERATED base is 0.35 (never starts higher)"
        - "recordRetrievalAndUse() increments count by 1"
        - "Guardian confirmation (successOutcome) increments by 3x"
        - "KNOWLEDGE_RETRIEVAL_AND_USE event emitted"
        - "getConfidenceDebugInfo() returns all 11 debug fields"
        - "Unit test: ACT-R formula matches expected values for sample inputs"
        - "Unit test: confidence ceiling enforcement rejects invalid values"
        - "Unit test: retrieval_count increment tested (1x and 3x Guardian)"
        - "Integration test: computeConfidence() for real nodes matches formula"
        - "Performance: computeConfidence() <1ms (pure function, no DB call)"
        - "npx tsc --noEmit passes"

    agents: [atlas, sentinel]
    model: sonnet
    dependencies: [E3-T002]
    complexity: M

  - id: E3-T006
    meta:
      title: "queryContext() for LLM context assembly"
      description: |
        Implement queryContext() — the bounded subgraph traversal that assembles
        knowledge context for LLM voice generation (Communication subsystem).

        Scope:
        Per Atlas: LLM needs rich context about Sylphie's world understanding to generate
        authentic responses. But unbounded graph traversal is expensive. queryContext()
        uses depth-limited BFS to gather relevant knowledge without query explosion.

        Implementation:
        - queryContext(nodeId, depth, confidenceFilter): Promise<Subgraph>
          * Start at nodeId (target entity/concept)
          * BFS traversal to specified depth (typically 1–3)
          * At each hop: fetch outgoing edges (RELATES_TO, INSTANCE_OF, HAS_PROPERTY, etc.)
          * Filter by confidence threshold (optional: only return edges with confidence > 0.50)
          * Collect all nodes and edges in subgraph
          * Compute transitive closure for inference (if A->[B] and B->[C], include A->[C])
          * Return {nodes: WkgNode[], edges: WkgEdge[], inferred: WkgEdge[]}

        - detectContradictions(subgraph): Contradiction[]
          * Within assembled subgraph, find contradictions (CONTRADICTS edges)
          * Return list of contradictions with severity
          * Passed to Communication for contextual awareness

        - queryContextWithProvenance(nodeId, depth, provenanceFilter): Promise<Subgraph>
          * Same as queryContext but filtered by provenance
          * Used for lesion test: exclude LLM_GENERATED to see what Sylphie "knows"
          * vs. what LLM is saying

        Performance targets (per Sentinel):
        - Depth 1: <5ms
        - Depth 2: <20ms
        - Depth 3: <50ms
        - Max depth enforced at 3 to prevent runaway queries

        Per Atlas: This is NOT a general-purpose graph query. It's tailored for LLM
        context assembly. Other subsystems use simpler queryEdges() + findNode().

      acceptance_criteria:
        - "queryContext() performs BFS to specified depth"
        - "Returns {nodes, edges, inferred_edges} subgraph"
        - "Filters by confidence threshold (optional)"
        - "Depth limited to max 3"
        - "Transitive closure computed (inferred edges)"
        - "detectContradictions() identifies CONTRADICTS edges in subgraph"
        - "queryContextWithProvenance() filters by provenance source"
        - "Lesion test query (exclude LLM_GENERATED) works correctly"
        - "Performance: depth 1 <5ms, depth 2 <20ms, depth 3 <50ms"
        - "Integration test: assemble context for entity with 5 neighbors, depth 2"
        - "Integration test: contradiction detection within subgraph"
        - "Integration test: lesion test filters LLM_GENERATED correctly"
        - "npx tsc --noEmit passes"

    agents: [atlas, sentinel]
    model: sonnet
    dependencies: [E3-T003, E3-T004]
    complexity: M

  - id: E3-T007
    meta:
      title: "SelfKgService implementation (Grafeo or fallback)"
      description: |
        Implement SelfKgService — Sylphie's self-model (KG(Self)).
        This stores her understanding of her own capabilities, drive patterns,
        prediction accuracy, and behavioral patterns.

        CRITICAL: Implementation path depends on E3-T001 (Grafeo spike) outcome.
        - If Grafeo viable: implement against Grafeo (embedded graph DB)
        - If Grafeo blocked: implement against Plan B (SQLite or alternative)
        Code structure remains identical; only backing store changes.

        Self KG Schema (per Atlas + Science):
        Nodes:
        - Capability { id, name, confidence, supported_contexts[], limitations[] }
        - DrivePattern { id, drive_name, trigger_condition, response_pattern, confidence }
        - PredictionAccuracy { id, prediction_type, accuracy_rate, error_patterns[], confidence }
        - BehavioralPattern { id, pattern_name, frequency, contexts[], confidence }

        Edges:
        - ENABLES (Capability enables another capability)
        - UNDERMINES (Capability undermines another)
        - PREDICTS (Behavioral pattern predicts outcome)
        - CORRELATES_WITH (Self-understanding correlates with external evidence)
        - CONFLICTS_WITH (Self-concept conflicts with contradicting evidence)

        Implementation (Grafeo path):
        - SelfKgService @Injectable() implementing ISelfKgService
        - Inject GRAFEO_INSTANCE token (initialized in KnowledgeModule)
        - upsertConcept(concept): Promise<SelfConcept>
          * Upsert node in Grafeo with confidence, provenance
          * Return updated node
        - queryConcept(id): Promise<SelfConcept | null>
          * Fetch single concept
        - queryByType(type: "capability" | "drive_pattern" | ...): Promise<SelfConcept[]>
          * Query all concepts of a type
        - recordConflict(node, conflictingEvidence): Promise<void>
          * When external evidence contradicts self-model: record conflict edge
          * Emit SELF_CONCEPT_UPDATED event
          * Do NOT immediately update confidence; flag for Learning analysis

        Integration with Drive Engine (E4):
        - Self KG is readable by Drive Engine (reads drive_patterns, prediction_accuracy)
        - Self KG is updated by Learning (E7) after consolidation
        - Self KG drives Self-Evaluation signals (Integrity, Cognitive Awareness)

        Per Science (Piaget): Self-model develops through accommodation when
        contradictions are detected. recordConflict() flags these for behavioral response.

        Per Canon Guardian Asymmetry: If guardian explicitly corrects self-model,
        update with GUARDIAN provenance (confidence boost to 3x weight).

      acceptance_criteria:
        - "SelfKgService implements ISelfKgService"
        - "Injects backing store token (Grafeo or Plan B)"
        - "All 4 node types supported (Capability, DrivePattern, etc.)"
        - "upsertConcept() stores with confidence and provenance"
        - "queryConcept() retrieves by ID"
        - "queryByType() filters by concept type"
        - "recordConflict() stores conflict edge without updating confidence"
        - "SELF_CONCEPT_UPDATED event emitted on conflict"
        - "Integration test: create 5 concepts, query by type, verify all returned"
        - "Integration test: record conflict, verify edge stored"
        - "Integration test: lesion test (exclude LLM_GENERATED) works for Self KG"
        - "Memory test: 1000 concepts persist without errors"
        - "npx tsc --noEmit passes"

    agents: [atlas, forge]
    model: sonnet
    dependencies: [E3-T001, E3-T002]
    complexity: M

  - id: E3-T008
    meta:
      title: "OtherKgService implementation (per-person Grafeo instances)"
      description: |
        Implement OtherKgService — per-person models of other people (KG(Jim), KG(Guardian), etc.).
        Each person gets their own isolated Grafeo instance for person-specific knowledge.

        Per Canon + Forge: Complete isolation between graphs prevents cross-contamination
        of person models. Every person maintains: traits, beliefs, preferences, fears, enjoys,
        and inconsistencies detected.

        Implementation:
        - OtherKgService @Injectable() with internal registry
        - getPersonGraph(person_id): Promise<Grafeo>
          * Return or create per-person Grafeo instance
          * Instances stored in Map<person_id, Grafeo>
          * Each instance has persistence (LevelDB or Plan B alternative)
        - upsertPersonConcept(person_id, concept): Promise<PersonConcept>
          * Get person's graph
          * Upsert node (id, label, type, confidence, provenance)
        - queryPersonConcept(person_id, id): Promise<PersonConcept | null>
        - queryPersonConceptsByType(person_id, type): Promise<PersonConcept[]>
          * Query by type ("trait", "belief", "preference", "fear", "enjoys")
        - recordPersonConflict(person_id, node, conflictingEvidence): Promise<void>
          * Record inconsistency as INCONSISTENT_WITH edge
          * Emit PERSON_CONCEPT_UPDATED event
        - listPersonGraphs(): string[]
          * Return list of person_ids tracked
        - deletePersonGraph(person_id): Promise<void>
          * Clean up person's Grafeo instance (for isolation tests)

        Registry Pattern (per Forge):
        - Internal Map prevents accidental external access to Grafeo instances
        - Only getPersonGraph() and deletePersonGraph() manage lifecycle
        - Each instance owns its own data directory

        Per Science (Piaget): Person models develop through repeated interactions.
        Each conflict recorded is assimilated into the person-specific schema.

        Example usage (from Communication module):
        1. User says "I prefer coffee" → queryPersonConcept("jim", "preferences")
           returns existing "Prefers.coffee" with confidence 0.85
        2. User says "Actually, I prefer tea" → CONFLICT detected
           → recordPersonConflict() creates INCONSISTENT_WITH edge
           → Drive Engine's Social signal increases (tension resolved)

      acceptance_criteria:
        - "OtherKgService implements IOtherKgService"
        - "Registry Map holds per-person Grafeo instances"
        - "getPersonGraph() lazily creates instance on first access"
        - "All 6 edge types supported (HAS_TRAIT, BELIEVES, PREFERS, FEARS, ENJOYS, INCONSISTENT_WITH)"
        - "upsertPersonConcept() stores in person-specific graph"
        - "queryPersonConceptsByType() filters by type"
        - "recordPersonConflict() stores conflict edge (INCONSISTENT_WITH)"
        - "PERSON_CONCEPT_UPDATED event emitted on conflict"
        - "listPersonGraphs() returns all tracked persons"
        - "deletePersonGraph() cleans up instance (for testing)"
