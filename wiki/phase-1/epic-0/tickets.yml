        - IRuleProposer: proposeRule()
        - IOpportunityDetector: evaluatePredictions(), detectOpportunities()
        - IDriveProcessManager: start(), stop(), isHealthy() (per Canon concern 1)

        src/drive-engine/drive-engine.tokens.ts:
        - DRIVE_STATE_READER, ACTION_OUTCOME_REPORTER, RULE_PROPOSER,
          DRIVE_PROCESS_MANAGER Symbol tokens

        Stub service classes. DriveReaderService stub returns a default DriveSnapshot.

        src/drive-engine/drive-engine.module.ts:
        - Exports only DRIVE_STATE_READER, ACTION_OUTCOME_REPORTER, RULE_PROPOSER
