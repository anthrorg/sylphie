        src/drive-engine/index.ts
      acceptance_criteria:
        - "IDriveStateReader has ZERO write methods (Canon Standard 6)"
        - "driveState$ is typed as Observable<DriveSnapshot>"
        - "IDriveProcessManager exists for lifecycle management"
        - "Module exports only read-side tokens"
        - "All stubs compile"
        - "npx tsc --noEmit passes"
    agents: [drive, forge]
    model: sonnet
    dependencies: [E0-T003, E0-T004]
    complexity: M

