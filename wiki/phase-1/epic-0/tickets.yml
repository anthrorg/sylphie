        src/communication/communication.tokens.ts
        Stub service classes.
        src/communication/communication.module.ts
        src/communication/index.ts
      acceptance_criteria:
        - "ITheaterValidator.validate() accepts BOTH responseContent AND driveSnapshot"
        - "ILlmService interface is in src/shared/ (not communication)"
        - "ILlmService has isAvailable() for Lesion Test support (per Canon Gap 5)"
        - "All stubs compile"
        - "npx tsc --noEmit passes"
