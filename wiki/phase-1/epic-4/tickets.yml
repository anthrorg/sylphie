    complexity: M

  - id: E4-T005
    meta:
      title: "Core drive computation: 12-drive tick loop, accumulation, clamping"
      description: |
        Implement the heart of the Drive Engine: the 12-drive system running in the child
        process. This is the core computation that updates drives every 10ms.

        Deliverables:
        - Drive state representation: src/drive-engine/drive-process/drive-state.ts
          * Drive vector: 12 values [-10.0, 1.0]
          * Core drives: systemHealth, moralValence, integrity, cognitiveAwareness
          * Complement drives: guilt, curiosity, boredom, anxiety, satisfaction, sadness, informationIntegrity, social
          * Accumulators: per-drive accumulation rate
          * Decay: per-drive decay rate (if applicable)

        - Tick loop: src/drive-engine/drive-process/drive-engine.ts
          * 100Hz loop (10ms per tick)
          * Tick sequence:
            1. Drain outcome queue (ACTION_OUTCOME, PREDICTION_RESULT messages)
            2. Compute base drive updates (accumulation, decay)
            3. Apply outcomes (satisfaction, guilt, anxiety adjustments)
            4. Apply contingencies (habituation, amplification, etc.)
            5. Apply cross-modulation (drive-to-drive effects)
            6. Clamp all drives to [-10.0, 1.0]
            7. Compute totalPressure (sum of all drives)
            8. Publish DRIVE_SNAPSHOT via IPC
            9. Schedule next tick

        - Base accumulation/decay: src/drive-engine/drive-process/accumulation.ts
          * Per-drive accumulation rate (e.g., systemHealth += 0.01 per tick without intervention)
          * Per-drive decay rate (e.g., curiosity -= 0.005 per tick if not stimulated)
          * Decay is *optional*; may or may not apply (TBD in CANON A.14)

        - Clamping: src/drive-engine/drive-process/clamping.ts
          * Clamp all drives to [-10.0, 1.0]
          * After cross-modulation and before snapshot publish
          * If any drive exceeds bounds, log warning (indicates tuning issue)

        Constants: src/drive-engine/constants/drives.ts
          * Drive names and enum
          * Default accumulation/decay rates (pending CANON A.14 specification)
          * Ranges and thresholds (anxiety > 0.7, system health < 0.3, etc.)

        Test coverage:
        - Unit: Accumulation, decay, clamping math correct
        - Integration: 100Hz tick loop produces DRIVE_SNAPSHOT every 10ms
        - Resilience: Tick loop survives malformed outcome messages (logged, skipped)

      acceptance_criteria:
        - "12-drive state vector maintained (4 core + 8 complement)"
        - "Tick loop runs at 100Hz (10ms per tick) ±2ms"
        - "DRIVE_SNAPSHOT published after each tick via IPC"
        - "All drives clamped to [-10.0, 1.0] (no out-of-range values)"
        - "totalPressure = sum of all drives (sanity check)"
        - "Outcomes from IPC queue applied each tick"
        - "Tick survives malformed messages (logged, not fatal)"
        - "Memory footprint <10MB (no unbounded state)"
        - "npx tsc --noEmit passes"

    agents: [drive]
    model: sonnet
    dependencies: []
    complexity: L

  - id: E4-T006
    meta:
      title: "Rule engine: PostgreSQL rule lookup, matching, default affect, caching"
      description: |
        Implement the rule engine in the child process. Rules are loaded from PostgreSQL
        drive_rules table and applied to incoming events (outcomes, predictions) to
        modulate drive state.

        Deliverables:
        - Rule loading: src/drive-engine/drive-process/rule-engine.ts
          * Read drive_rules table from PostgreSQL on startup
          * Periodic reload every 60 seconds (rules can be approved by guardian)
          * Rule format: { id, trigger, effect, enabled, confidence, created_at }

        - Rule matching: src/drive-engine/drive-process/rule-matching.ts
          * Pattern matching: trigger is a string pattern (e.g., "action_success AND anxiety > 0.7")
          * Event context: action outcome, prediction result, current drive state
          * Determine which rules match the current event
          * Matching is deterministic and fast (< 5ms for 100 rules)

        - Rule application: src/drive-engine/drive-process/rule-application.ts
          * Apply matched rules: execute the 'effect' (e.g., "integrity += 0.10")
          * Effect syntax: simple DSL: "drive_name += value" or "drive_name *= factor"
          * Multiple rules can match one event; all applicable rules fire
          * Accumulate effects, then apply once per tick

        - Default affect: src/drive-engine/drive-process/default-affect.ts
          * If no rules match an event, apply default affect
          * Example: action_success → default affect is Satisfaction += 0.10
          * Default affects handle common cases; rules handle special cases

        - Caching: src/drive-engine/drive-process/rule-cache.ts
          * LRU cache of matched rules per event pattern
          * Cache key: event type + drive snapshot hash
          * Reduces recomputation of rule matching on repeated events
          * Cache invalidated when rules reload

        Constants: src/drive-engine/constants/rules.ts
          * Default affects (action_success, action_failure, prediction_hit, prediction_miss, etc.)
          * Rule confidence thresholds (only apply rules with confidence > 0.5?)

        Test coverage:
        - Unit: Pattern matching, rule application, default affect
        - Integration: Rules from PostgreSQL loaded, applied on event
        - Cache validation: Repeated events use cache correctly

      acceptance_criteria:
        - "Drive_rules table queried on startup and every 60s"
        - "Rules with enabled=true loaded; disabled rules ignored"
        - "Rule pattern matching works for common triggers (e.g., 'anxiety > 0.7 AND action_success')"
        - "Matched rules applied: effect executed (drive_name += value syntax)"
        - "Multiple matching rules all fire; effects accumulate"
        - "Default affects applied if no rules match"
        - "Rule cache reduces lookup time for repeated patterns"
        - "Rule reload doesn't interrupt tick loop (async load)"
        - "npx tsc --noEmit passes"

    agents: [drive, forge]
    model: sonnet
    dependencies: [E4-T005]
