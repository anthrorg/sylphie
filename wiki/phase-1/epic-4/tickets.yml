epic: 4
title: "Drive Engine (Isolated Process)"
phase: 1
created: 2026-03-29
status: planned

# Synthesized from 5 agent analyses: Drive (computation), Forge (architecture),
# Skinner (behavioral science), Ashby (systems theory), Canon (CANON compliance).
#
# Key architectural principle: Drive Engine runs in separate Node.js process
# with one-way IPC communication. Write-protection enforced at three levels:
# structural (TypeScript), process (separate OS process), database (PostgreSQL RLS).
#
# CRITICAL: Seven decisions pending Jim approval before implementation starts.
# See decisions.md for full rationale.

tickets:
  - id: E4-T001
    meta:
      title: "IPC infrastructure: child_process.fork, typed messages, health monitoring"
      description: |
        Build the inter-process communication (IPC) channel between main NestJS process and
        Drive Engine child process. This is the architectural foundation for process isolation
        and write-protection enforcement.

        Deliverables:
        - Child process bootstrap: src/drive-engine/drive-process/main.ts
          * Spawn entry point with separate event loop
          * IPC message listener setup
          * Graceful shutdown handler

        - IPC message type definitions: src/drive-engine/interfaces/ipc.interfaces.ts
          * DriveIPCMessage union type
          * Inbound messages: ACTION_OUTCOME, PREDICTION_RESULT, SESSION_START, SESSION_END
          * Outbound messages: DRIVE_SNAPSHOT, OPPORTUNITY_CREATED, DRIVE_EVENT, HEALTH_STATUS, ERROR
          * Payload types for each message
          * Message validation schema (zod or joi)

        - IPC channel service: src/drive-engine/ipc-channel/ipc-channel.service.ts
          * fork() child process with stdio configuration
          * Message send queue (FIFO) for main → child
          * Message handler dispatch for child → main messages
          * Error handler for malformed messages
          * Process lifecycle tracking (spawn time, restart count)

        - Health monitoring: src/drive-engine/ipc-channel/health-monitor.ts
          * Periodic ping-pong to verify child liveness
          * Heartbeat timeout detection (>5s without DRIVE_SNAPSHOT = unhealthy)
          * Memory usage tracking via process.memoryUsage()
          * CPU usage monitoring (high CPU >80% = log warning)

        - Recovery mechanism: src/drive-engine/ipc-channel/recovery.ts
          * Exponential backoff retry on crash (1s, 2s, 4s, 8s, max 60s)
          * Max retry count (3) before safe mode alert
          * In-flight message queue persistence across restarts
          * Restart logging with timestamp and reason

        Test coverage:
        - Unit: Message serialization/deserialization, type validation
        - Integration: Fork child, send message, receive response within 100ms
        - Resilience: Child crash → auto-restart → message queue drained

      acceptance_criteria:
        - "Child process spawned successfully via child_process.fork()"
        - "Outbound IPC messages (ACTION_OUTCOME) received by child within 10ms"
        - "Inbound IPC messages (DRIVE_SNAPSHOT) handled by main within 10ms"
        - "Message validation rejects malformed payloads (non-string type values, missing fields)"
        - "Health monitor detects unresponsive child (no DRIVE_SNAPSHOT for >5s)"
        - "Recovery mechanism respawns child after crash with exponential backoff"
        - "In-flight messages not lost on child restart"
        - "npx tsc --noEmit passes"
        - "Integration test suite passes (100% of IPC scenarios)"

    agents: [drive, forge]
    model: sonnet
    dependencies: []
    complexity: M

  - id: E4-T002
    meta:
      title: "DriveReaderService: read-only facade, Observable, defensive copies"
      description: |
        Build the main process-side service that provides read-only access to drive state.
        This service is the interface through which Decision Making and Communication
        access the Drive Engine's output. No write methods exist.

        Deliverables:
        - DriveReaderService: src/drive-engine/drive-reader/drive-reader.service.ts
          * Implements IDriveStateReader interface (read-only)
          * Methods:
            - getCurrentState(): DriveSnapshot (returns defensive JSON copy)
            - get driveState$(): Observable<DriveSnapshot> (RxJS Subject as Observable)
            - getLatestTimestamp(): number
            - isDriveHealthy(): boolean

        - Snapshot caching: src/drive-engine/drive-reader/drive-state-snapshot.ts
          * Cache latest DRIVE_SNAPSHOT from IPC message
          * Defensive copy via JSON.parse(JSON.stringify()) to prevent external mutation
          * Coherence validation:
            - All drive values in [-10.0, 1.0]
            - totalPressure = sum of all drives (sanity check)
            - No all-zero snapshot (indicates child crash)
            - No unchanging snapshot for >1s (indicates child hung)
          * Throw DriveCoherenceError on validation failure

        - Observable stream: src/drive-engine/drive-reader/drive-reader.module.ts
          * RxJS Subject emits DriveSnapshot on each DRIVE_SNAPSHOT IPC message
          * Observable is publicly exposed for reactive subscribers
          * Subject is internal; consumers only see Observable

        Integration:
        - Inject DriveReaderService into decision-making and communication modules
        - Provide IDriveStateReader token for dependency injection
        - No other services have direct access to the child process

        Test coverage:
        - Unit: Defensive copy prevents mutation, Observable emits on message
        - Integration: DriveReaderService provides consistent snapshots to consumers
        - Resilience: Snapshot validation catches corrupt/unresponsive child

      acceptance_criteria:
        - "DriveReaderService exports IDriveStateReader interface (no write methods)"
        - "getCurrentState() returns JSON-copy defensive snapshot (no reference sharing)"
        - "driveState$ Observable emits on each DRIVE_SNAPSHOT message"
        - "Snapshot coherence validation rejects invalid states (drives outside [-10.0, 1.0], all zeros, unchanged)"
        - "External mutation of returned snapshot does not affect internal state"
        - "Multiple subscribers receive same snapshot (no divergence)"
        - "DriveReaderService is injectable via DI token"
        - "npx tsc --noEmit passes"

    agents: [forge, drive]
    model: sonnet
    dependencies: [E4-T001]
    complexity: M

  - id: E4-T003
    meta:
      title: "ActionOutcomeReporterService: fire-and-forget queue, IPC send"
      description: |
        Build the service that Decision Making and Communication use to report action
        outcomes to the Drive Engine. This is fire-and-forget (async) to prevent decision
        latency from blocking.

        Deliverables:
        - ActionOutcomeReporterService: src/drive-engine/action-outcome-reporter/action-outcome-reporter.service.ts
          * Implements IActionOutcomeReporter interface
          * Methods:
            - reportOutcome(action: Action, outcome: Outcome): Promise<void>
            - reportPredictionResult(prediction: Prediction, actual: any): Promise<void>
          * No return value; fire-and-forget semantics

        - Outcome queue: src/drive-engine/action-outcome-reporter/outcome-queue.ts
          * FIFO queue for ACTION_OUTCOME and PREDICTION_RESULT messages
          * Max queue size: 1000 (configurable)
          * Async flushing via setImmediate()
          * Queue persistence: if child is temporarily unavailable, queue accumulates
          * Max retries: 3 attempts per message before dropping (logged)

        - Message formatting:
          * ACTION_OUTCOME payload:
            - actionId: string (references procedure from WKG)
            - outcome: 'success' | 'partial' | 'failure'
            - timestamp: number (milliseconds)
            - context: { driveState: DriveSnapshot, wkgState: string (hash?), prediction?: Prediction }
          * PREDICTION_RESULT payload:
            - predictionId: string
            - predictedValue: any
            - actualValue: any
            - accuracy: number (MAE or categorical match)
            - timestamp: number

        Integration:
        - Inject into ExecutorEngine (E5) for action execution feedback
        - Inject into CommunicationService (E6) for response quality feedback
        - Called asynchronously; never blocks decision loop

        Test coverage:
        - Unit: Queue FIFO ordering, max size enforcement, retry logic
        - Integration: Outcomes reach child process within 100ms
        - Resilience: Child unavailable → queue accumulates → child restarts → queue drains

      acceptance_criteria:
        - "reportOutcome() accepts action and outcome, returns immediately (non-blocking)"
        - "Outcomes are queued and sent asynchronously (setImmediate)"
        - "Message queue respects max size (1000); oldest dropped if exceeded"
        - "Failed send retries up to 3 times with exponential backoff"
        - "Queued messages reach child within 100ms of queue flush"
        - "Outcome payload includes action, outcome type, and context snapshot"
        - "IActionOutcomeReporter interface matches expected consumers"
        - "npx tsc --noEmit passes"

    agents: [forge, drive]
    model: sonnet
    dependencies: [E4-T001]
    complexity: M

  - id: E4-T004
    meta:
      title: "RuleProposerService: INSERT to proposed_drive_rules, PostgreSQL RLS"
      description: |
        Build the service that the Drive Engine (and optionally Learning) uses to propose
        new drive rules. Rules go into PostgreSQL proposed_drive_rules table (not active
        drive_rules). Guardian must explicitly approve to activate.

        Deliverables:
        - RuleProposerService: src/drive-engine/rule-proposer/rule-proposer.service.ts
          * Implements IRuleProposer interface
          * Method:
            - proposeRule(rule: ProposedDriveRule): Promise<void>
          * Publishes event: RULE_PROPOSED to TimescaleDB (for audit trail)

        - PostgreSQL client: src/drive-engine/rule-proposer/postgres-rules-client.ts
          * Database connection using sylphie_app role (INSERT-only on proposed_drive_rules)
          * Query:
            INSERT INTO proposed_drive_rules
              (trigger, effect, confidence, proposed_by, reasoning, created_at)
            VALUES ($1, $2, $3, $4, $5, NOW())
          * No UPDATE or DELETE on active drive_rules (role forbids this)
          * Connection pooling for multiple proposals

        - ProposedDriveRule type: src/drive-engine/interfaces/rules.interfaces.ts
          * trigger: string (event pattern, e.g., "action_success AND anxiety > 0.7")
          * effect: string (drive change, e.g., "integrity += 0.10")
          * confidence: number (system's confidence in the rule, 0-1)
          * proposed_by: string (subsystem that proposed, e.g., "drive_engine", "learning")
          * reasoning: string (explanation for guardian review)

        - Rule proposal workflow:
          1. System decides a new rule would help: "When action succeeds under anxiety, boost integrity"
          2. Call proposeRule({ trigger: '...', effect: '...', ... })
          3. Rule inserted into proposed_drive_rules (inactive)
          4. Event emitted: RULE_PROPOSED to TimescaleDB
          5. Guardian reviews queue and approves (moves to drive_rules) or rejects (deletes)

        Test coverage:
        - Unit: ProposedDriveRule validation, INSERT query formatting
        - Integration: Proposed rule appears in DB within 100ms
        - Security: Verify app role cannot UPDATE/DELETE drive_rules (should fail)
        - Audit: RULE_PROPOSED event emitted to TimescaleDB

      acceptance_criteria:
        - "proposeRule() inserts rule into proposed_drive_rules table"
        - "INSERT succeeds using sylphie_app role (read-only on drive_rules)"
        - "Proposed rule includes: trigger, effect, confidence, proposed_by, reasoning"
        - "RULE_PROPOSED event emitted to TimescaleDB for audit trail"
        - "App cannot directly modify active drive_rules (role permission enforced)"
        - "Database connection pooling prevents exhaustion"
        - "npx tsc --noEmit passes"

    agents: [forge]
    model: sonnet
