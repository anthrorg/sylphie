  - id: E4-T010
    meta:
      title: "Opportunity detection: pattern classification, priority queue, decay, cold-start dampening"
      description: |
        Implement opportunity detection in the child process. Opportunities are generated
        from prediction failures and classified by type (recurring, high-impact, low-priority).
        Opportunities are emitted to Planning subsystem for procedure creation.

        Deliverables:
        - Opportunity detection: src/drive-engine/drive-process/opportunity-detector.ts
          * Input: prediction failures (MAE > 0.20) from prediction-evaluator
          * Classify opportunities:
            - RECURRING: same prediction fails multiple times (>3 in last 10)
            - HIGH_IMPACT: large prediction error (MAE > 0.40) or involves high-pressure situation
            - LOW_PRIORITY: single failure, low magnitude, low pressure context

        - Priority scoring: src/drive-engine/drive-process/opportunity-priority.ts
          * Priority = log(frequency) * magnitude
            - frequency: how many times has this prediction failed? (log scale)
            - magnitude: what is the MAE? (linear)
          * Example: recurring (freq=5) + large error (mae=0.35) = high priority
          * Example: single failure (freq=1) + small error (mae=0.12) = low priority
          * Cold-start dampening: during sessions 1-N, multiply priority *= (sessionNumber / N)
            - Session 1: priority *= 0.1
            - Session 5: priority *= 0.5
            - Session 10: priority *= 1.0 (full priority)

        - Opportunity decay: src/drive-engine/drive-process/opportunity-decay.ts
          * Opportunities expire if the underlying prediction becomes accurate
          * When MAE < 0.10 for the same prediction type: decay opportunity priority by 0.5
          * When MAE stays < 0.10 for 100 consecutive predictions: remove opportunity entirely
          * Prevents backlog of "fixed" opportunities

        - Opportunity queue: src/drive-engine/drive-process/opportunity-queue.ts
          * Priority queue of current opportunities
          * Top opportunities emitted to Planning (every 100 ticks, max 5 per tick)
          * Opportunities include: prediction_type, mae, context, priority, session_number

        - Planning integration: src/drive-engine/drive-process/planning-publisher.ts
          * Emit OPPORTUNITY_CREATED message via IPC to main process
          * Main process relays to Planning subsystem (E8)
          * Opportunity metadata includes all context needed for plan creation

        Constants: src/drive-engine/constants/opportunity-detection.ts
          * Recurring threshold: 3 failures in 10 predictions
          * High-impact threshold: MAE > 0.40 OR totalPressure > 0.8
          * Cold-start session count: N (pending Jim approval; planning assumes 10)
          * Decay threshold: MAE < 0.10 for 100+ consecutive predictions

        Test coverage:
        - Unit: Priority scoring math, decay logic, cold-start dampening
        - Integration: Opportunities emitted with correct priority and metadata
        - Behavioral: Recurring failures get higher priority than single failures
        - Cold-start: Opportunities dampened in early sessions, full priority later

      acceptance_criteria:
        - "Opportunities classified: RECURRING, HIGH_IMPACT, LOW_PRIORITY"
        - "Priority scored: priority = log(frequency) * magnitude"
        - "Cold-start dampening: priority *= (sessionNumber / N) for N sessions"
        - "Opportunity decay: priority reduced when underlying prediction improves"
        - "Opportunity queue maintains priority ordering (max N opportunities at a time)"
        - "OPPORTUNITY_CREATED messages emitted to Planning"
        - "Opportunity metadata complete: type, mae, context, priority, session"
        - "No unbounded queue growth (old expired opportunities removed)"
        - "npx tsc --noEmit passes"

