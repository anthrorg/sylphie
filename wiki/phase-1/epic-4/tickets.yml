  - id: E4-T007
    meta:
      title: "Behavioral contingencies: all 5 CANON contingencies implemented"
      description: |
        Implement the five behavioral contingencies that shape personality:
        1. Satisfaction Habituation Curve
        2. Anxiety Amplification
        3. Guilt Repair Contingency
        4. Social Comment Quality
        5. Curiosity Information Gain

        Deliverables:
        - Satisfaction Habituation: src/drive-engine/drive-process/behavioral-contingencies/satisfaction-habituation.ts
          * Track consecutive successes on same action topography
          * Curve: 1st=+0.20, 2nd=+0.15, 3rd=+0.10, 4th=+0.05, 5th+=+0.02
          * Counter resets on different action selection
          * Query TimescaleDB for recent action history (last 5 actions of same type)
          * Prevents habituation collapse by incentivizing behavioral diversity

        - Anxiety Amplification: src/drive-engine/drive-process/behavioral-contingencies/anxiety-amplification.ts
          * Check: is anxiety > 0.7?
          * If yes and action outcome is failure: confidence reduction *= 1.5
          * Else: normal confidence reduction applies
          * Prevents learned helplessness while encouraging caution under stress

        - Guilt Repair: src/drive-engine/drive-process/behavioral-contingencies/guilt-repair.ts
          * Track: did system acknowledge error? (inferred from communication analysis or explicit signal)
          * Track: did system change behavior? (detect if same error avoided in similar context)
          * Relief based on what occurred:
            - Acknowledgment only: guilt -= 0.10
            - Behavioral change only: guilt -= 0.15
            - Both: guilt -= 0.30
          * Requires behavioral change detection (fuzzy matching on action categories + context)

        - Social Comment Quality: src/drive-engine/drive-process/behavioral-contingencies/social-comment-quality.ts
          * Communication module timestamps Sylphie-initiated comments
          * When guardian responds, check: response within 30 seconds?
          * If yes: social -= 0.15 (relief) + satisfaction += 0.10 (bonus)
          * Shapes discrimination: system learns which comment types elicit responses

        - Curiosity Information Gain: src/drive-engine/drive-process/behavioral-contingencies/curiosity-information-gain.ts
          * Measure actual new information created:
            - New nodes added to WKG (query Neo4j)
            - Confidence increases (sum of ΔConfidence for updated nodes)
            - Prediction errors resolved (MAE > 0.20 now < 0.10)
          * Relief proportional: curiosity -= k * (newNodes + confidenceDelta + resolvedErrors)
          * Prevents reward hacking: revisiting known territory ≈ 0 relief

        Integration:
        - All contingencies called in tick loop after base drive updates
        - Contingencies read from TimescaleDB and WKG (async, with caching)
        - Contingencies modify drive state in-place before cross-modulation

        Test coverage:
        - Unit: Each contingency formula correct (satisfaction curve, anxiety multiplier, etc.)
        - Integration: Contingencies applied correctly in sequence
        - Behavioral: System exhibits predicted behavior patterns (diversity, caution under anxiety, etc.)

      acceptance_criteria:
        - "Satisfaction Habituation: curve values correct, counter resets on action change"
        - "Anxiety Amplification: 1.5x reduction when anxiety>0.7 and failure"
        - "Guilt Repair: acknowledgment=-0.10, change=-0.15, both=-0.30"
        - "Social Comment Quality: 30s window detection, relief+bonus when triggered"
        - "Curiosity Information Gain: proportional to actual new nodes/confidence/resolved errors"
        - "All contingencies query necessary data (TimescaleDB, WKG) efficiently"
        - "No blocking queries in tick loop (cache results or async load)"
        - "npx tsc --noEmit passes"

    agents: [drive, skinner]
    model: sonnet
    dependencies: [E4-T005, E4-T006]
    complexity: L

  - id: E4-T008
    meta:
      title: "Self-evaluation: KG(Self) reads on slower timescale, identity lock-in prevention"
      description: |
        Implement self-evaluation: Drive Engine reads KG(Self) (Grafeo) on a slower timescale
        to adjust drive baselines based on self-assessed capabilities. This prevents identity
        lock-in (system permanently convinced it's "bad at X").

        Deliverables:
        - Self-evaluation loop: src/drive-engine/drive-process/self-evaluation.ts
          * Runs on slower cadence than drive ticks (e.g., every 60 ticks = every 600ms)
          * Reads KG(Self) to get Sylphie's self-assessed capabilities and drive_patterns
          * Adjusts drive baselines based on self-assessment
          * Example: if KG(Self) says "I'm bad at social interaction" (capability < 0.3),
            reduce Social drive baseline by 0.05 for next tick window

        - KG(Self) interface: src/drive-engine/interfaces/self-kg.interfaces.ts
          * SelfCapability: { id, name, success_rate, last_executed, confidence }
          * DrivePattern: { drive, stimulus, response_strength, examples, last_observed }
          * PredictionAccuracy: { domain, mae, sample_count, confidence }
          * Query interface (read-only): queryCapability(), queryDrivePattern(), queryPredictionAccuracy()

        - Circuit breakers: src/drive-engine/drive-process/self-evaluation-circuit-breaker.ts
          * Prevent rumination loops: if self-assessment is negative for N consecutive evaluations, pause self-eval
          * Max consecutive negative assessments before pause: 5
          * Pause duration: 5 seconds (re-enable self-eval after cool-down)
          * Log when circuit breaker trips (indicates potential issue)

        - Drive baseline adjustment: src/drive-engine/drive-process/drive-baseline-adjustment.ts
          * Current drive baseline: systemHealth = 0.5 (default)
          * Adjustment based on KG(Self):
            - If self-assessed system_health < 0.3: reduce baseline to 0.35
            - If self-assessed system_health > 0.7: maintain baseline 0.5
            - If recovery: gradually restore baseline (not instantaneous)
          * Prevents permanent depression from transient failures

        - Grafeo integration: src/drive-engine/drive-process/database-clients.ts
          * Child process maintains Grafeo connection to KG(Self) (same as main process)
          * Read-only queries; no writes from Drive Engine
          * Queries are async and cached (check cache first)
          * Timeout on slow queries (>500ms = skip this evaluation cycle)

        Constants: src/drive-engine/constants/self-evaluation.ts
          * Self-eval cadence: every 60 ticks (600ms)
          * Circuit breaker threshold: 5 consecutive negative assessments
          * Pause duration: 5000ms
          * Baseline adjustment factors (per drive)

        Test coverage:
        - Unit: Baseline adjustment math, circuit breaker logic
        - Integration: Self-eval loop queries KG(Self) every 600ms
        - Resilience: Slow/missing KG(Self) doesn't block ticks (async, cached)
        - Circuit breaker: Rumination loops trigger pause correctly

      acceptance_criteria:
        - "Self-evaluation runs every 60 ticks (±10ms accuracy)"
        - "KG(Self) queries complete within 500ms or skipped"
        - "Drive baselines adjusted based on self-assessed capabilities"
        - "Negative self-assessment doesn't crash (circuit breaker prevents rumination)"
        - "Circuit breaker pauses self-eval for 5s after 5 consecutive negatives"
        - "Baseline restoration gradual, not instantaneous"
        - "Read-only access to KG(Self); no writes from Drive Engine"
        - "npx tsc --noEmit passes"

    agents: [drive, forge]
    model: sonnet
    dependencies: [E4-T005]
    complexity: M

  - id: E4-T009
    meta:
      title: "Prediction accuracy evaluation: MAE computation, prediction classification"
      description: |
        Implement prediction accuracy evaluation. Drive Engine reads prediction outcomes
        from TimescaleDB and computes Mean Absolute Error (MAE) for type-specific predictions.
        MAE feeds Type 1/Type 2 graduation criteria.

        Deliverables:
        - Prediction evaluation: src/drive-engine/drive-process/prediction-evaluator.ts
          * Read prediction outcomes from TimescaleDB (asynchronously)
          * Predictions are created by Decision Making before action execution
          * Outcomes are recorded after action execution (actual result)
          * Compute MAE: mean absolute error over last N predictions (N = 10)
          * Classification:
            - MAE < 0.10: ACCURATE (prediction was good)
            - MAE 0.10-0.20: MODERATE (passable)
            - MAE > 0.20: POOR (unreliable)

        - MAE query: src/drive-engine/drive-process/mae-query.ts
          * SELECT predictions.predicted_value, outcomes.actual_value
            FROM predictions JOIN outcomes ON predictions.id = outcomes.prediction_id
            WHERE predictions.type = $1 AND predictions.created_at > NOW() - INTERVAL '1 hour'
            ORDER BY predictions.created_at DESC LIMIT 10
          * Compute: mae = sum(abs(predicted - actual)) / count
          * If count < 10: mark as "insufficient data" (don't use for graduation yet)
          * Cache result: MAE per prediction type, update every 10 predictions or 60s

        - Opportunity signal: src/drive-engine/drive-process/opportunity-signal.ts
          * When prediction is POOR (MAE > 0.20), emit OPPORTUNITY_CREATED
          * Opportunity metadata:
            - prediction_type: string
            - mae: number
            - recent_failures: number (count of failed predictions in last 10)
            - severity: "low" | "medium" | "high" (based on MAE magnitude)

        - Graduation criteria: src/drive-engine/drive-process/graduation-criteria.ts
          * Type 1 candidates require: confidence > 0.80 AND MAE < 0.10
          * Demotion if: MAE > 0.15 (prediction accuracy degraded)
          * Communication to Decision Making (E5): include MAE in action context

        - TimescaleDB integration: src/drive-engine/drive-process/database-clients.ts
          * Read predictions and outcomes from TimescaleDB
          * Queries are async and cached (per prediction type)
          * Timeout on slow queries: >500ms = skip this evaluation, use cached MAE

        Constants: src/drive-engine/constants/prediction-evaluation.ts
          * MAE window: 10 predictions
          * MAE thresholds: ACCURATE < 0.10, MODERATE < 0.20, POOR >= 0.20
          * Cache TTL: 60 seconds or 10 new predictions (whichever comes first)

        Test coverage:
        - Unit: MAE computation correct (arithmetic validation)
        - Integration: Prediction MAE queries work, classifications correct
        - Resilience: Missing outcomes don't crash (marked as "insufficient data")
        - Graduation: Opportunities emitted when MAE > 0.20

      acceptance_criteria:
        - "MAE computed over last 10 predictions per type"
        - "Classification: ACCURATE (<0.10), MODERATE (0.10-0.20), POOR (>0.20)"
        - "Insufficient data (<10 predictions) handled gracefully"
        - "OPPORTUNITY_CREATED emitted when MAE > 0.20"
        - "MAE cached per prediction type; cache invalidates on new data or TTL"
        - "Queries to TimescaleDB timeout at 500ms (cached value used)"
        - "Graduation criteria passed to Decision Making (confidence > 0.80 AND MAE < 0.10)"
        - "npx tsc --noEmit passes"

