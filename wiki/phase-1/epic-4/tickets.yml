  - id: E4-T012
    meta:
      title: "Event emission: drive events to TimescaleDB from child process"
      description: |
        Implement event emission from the Drive Engine child process to TimescaleDB.
        All drive-related events are recorded for audit trail and analysis.

        Deliverables:
        - Drive event types: src/drive-engine/interfaces/drive-events.ts
          * DRIVE_TICK: on every tick (100Hz)
          * OUTCOME_PROCESSED: when an ACTION_OUTCOME is applied
          * OPPORTUNITY_CREATED: when an opportunity is detected
          * DRIVE_EVENT: when a contingency fires (satisfaction gained, guilt processed, etc.)
          * SELF_EVALUATION_RUN: when KG(Self) evaluation occurs
          * RULE_APPLIED: when a drive rule fires
          * HEALTH_STATUS: periodic heartbeat (every 60 ticks)

        - Event emission: src/drive-engine/drive-process/event-emitter.ts
          * IEventEmitter interface (write-only to TimescaleDB)
          * Methods:
            - emitTick(snapshot: DriveSnapshot, rulesFired: Rule[]): Promise<void>
            - emitOutcomeProcessed(outcome: Outcome, resultingDrives: DriveVector): Promise<void>
            - emitOpportunityCreated(opportunity: Opportunity): Promise<void>
            - emitContingency(contingency: Contingency, driveChange: Map<string, number>): Promise<void>
            - emitHealthStatus(timestamp: number, memoryUsage: number): Promise<void>

        - TimescaleDB integration: src/drive-engine/drive-process/database-clients.ts
          * Child process connects to TimescaleDB as 'drive_engine' role
          * INSERT events with:
            - type: string (event type)
            - subsystem: 'DRIVE_ENGINE'
            - payload: JSON (event-specific data)
            - timestamp: number (milliseconds)
            - session_id: string (current session)
            - drive_snapshot: JSON (current drive state)
          * Async writes (non-blocking)
          * Retry on failure (up to 3 retries)

        - Event format (example):
          ```
          {
            type: 'CONTINGENCY_APPLIED',
            subsystem: 'DRIVE_ENGINE',
            payload: {
              contingency_type: 'SATISFACTION_HABITUATION',
              action_id: 'speak_to_guardian_001',
              consecutive_count: 2,
              relief_amount: 0.15,
              previous_satisfaction: 0.45,
              new_satisfaction: 0.60
            },
            timestamp: Date.now(),
            drive_snapshot: { systemHealth: 0.5, ... }
          }
          ```

        - Batching: src/drive-engine/drive-process/event-batching.ts
          * Queue events (non-blocking emit calls)
          * Batch write every 100ms or 50 events (whichever comes first)
          * Reduces TimescaleDB write pressure

        Constants: src/drive-engine/constants/events.ts
          * Event type enum
          * Batch size: 50
          * Batch timeout: 100ms
          * Retry count: 3

        Test coverage:
        - Unit: Event formatting, batch logic
        - Integration: Events appear in TimescaleDB within 200ms
        - Resilience: Slow TimescaleDB doesn't block ticks (batched, async)

      acceptance_criteria:
        - "All drive events emitted to TimescaleDB with correct type and payload"
        - "Events include timestamp, subsystem, drive snapshot, session_id"
        - "Event emission is async (non-blocking to tick loop)"
        - "Events batched: 50 events or 100ms timeout"
        - "Retry on failure: up to 3 retries with backoff"
        - "Slow TimescaleDB doesn't affect tick latency (queued)"
        - "Event payload includes sufficient context for audit/debugging"
        - "npx tsc --noEmit passes"

