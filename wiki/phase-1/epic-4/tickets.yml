  - id: E4-T013
    meta:
      title: "PostgreSQL RLS enforcement: write-protection at database level, credential segregation"
      description: |
        Enforce write-protection at the PostgreSQL database level using role-based access
        control (RLS). This is Layer 3 of the three-layer isolation boundary.

        Deliverables:
        - Database role creation and permission assignment:
          * Create role sylphie_app (main NestJS process):
            - GRANT SELECT ON drive_rules TO sylphie_app;
            - GRANT SELECT, INSERT ON proposed_drive_rules TO sylphie_app;
            - (NO UPDATE, DELETE on drive_rules)
          * Create role drive_engine (Drive Engine child process):
            - GRANT SELECT ON drive_rules TO drive_engine;
            - GRANT SELECT ON proposed_drive_rules TO drive_engine;
            - (NO INSERT, UPDATE, DELETE)
          * Create role guardian_admin (administrator only):
            - GRANT ALL ON drive_rules TO guardian_admin;
            - (can approve rules, move from proposed to active)

        - Credential management:
          * Main process uses sylphie_app credentials (passed via environment variable)
          * Child process uses drive_engine credentials (passed at startup)
          * Guardian admin credentials stored separately, never in code
          * Connection strings do NOT contain passwords (use environment variables)

        - Write-protection verification: src/drive-engine/postgres-verification/verify-rls.ts
          * On startup, verify that app role cannot UPDATE drive_rules:
            - Attempt: UPDATE drive_rules SET enabled = false WHERE id = 'test'
            - Expected: ERROR permission denied
            - If permitted: FAIL STARTUP and alert guardian
          * Log: "RLS verification passed" on success

        - Migration script: src/db/migrations/rls-setup.sql
          * Idempotent SQL to set up roles and permissions
          * Can be run on existing database
          * Includes role creation, grants, and verification

        Documentation: docs/architecture/database-isolation.md
          * Explain three-layer boundary
          * Show role permission matrix (what each role can do)
          * Show credential management strategy

        Test coverage:
        - Unit: Migration script creates roles correctly (test against test DB)
        - Integration: Credentials passed correctly, app cannot UPDATE drive_rules
        - Security: Verify all three roles exist with correct permissions

      acceptance_criteria:
        - "sylphie_app role: SELECT drive_rules, SELECT/INSERT proposed_drive_rules"
        - "drive_engine role: SELECT drive_rules, SELECT proposed_drive_rules"
        - "guardian_admin role: ALL permissions on drive_rules"
        - "Application startup fails if RLS verification fails"
        - "Credentials passed via environment variables (not in code)"
        - "Migration script is idempotent"
        - "No hardcoded passwords in codebase"
        - "npx tsc --noEmit passes"

