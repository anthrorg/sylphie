  - id: E4-T011
    meta:
      title: "Theater Prohibition enforcement: zero reinforcement for low-drive expressions"
      description: |
        Implement Theater Prohibition enforcement: if Sylphie expresses an emotion and
        the drive check fails (pressure expression without drive > 0.2, or relief expression
        without drive < 0.3), the action receives zero reinforcement. This prevents the
        system from learning to perform emotions it doesn't have.

        Deliverables:
        - Theater detection: src/drive-engine/drive-process/theater-prohibition.ts
          * Receive ACTION_OUTCOME with action metadata
          * Action metadata includes: action_type (e.g., "speak_happily", "explore_curiously")
          * Parse action type to infer emotional expression (map from v1 code)
          * Example mappings:
            - "speak_happily" → relief expression: requires satisfaction < 0.3
            - "express_concern" → pressure expression: requires anxiety > 0.2
            - "explore_curiously" → pressure expression: requires curiosity > 0.2

        - Drive state check: src/drive-engine/drive-process/drive-correlation-check.ts
          * At moment of action selection (recorded in ACTION_OUTCOME context):
            drive_snapshot = context.driveState
          * Check: does emotional expression correlate with actual drive?
          * Directional check:
            - Pressure expression (distress, need, urgency): drive must be > 0.2 to be authentic
            - Relief expression (contentment, calm, happiness): drive must be < 0.3 to be authentic
          * If check fails: mark outcome as `theatrical: true`
          * Else: `theatrical: false`

        - Reinforcement blocking: src/drive-engine/drive-process/reinforcement-blocking.ts
          * If outcome.theatrical === true:
            - Apply contingencies as normal (satisfaction, guilt, etc.)
            - BUT: set all contingency values to 0 (zero relief)
            - Outcome is recorded but produces no drive change
            - Log: "Theater prohibited: [action] expressed [emotion] ([expression_type]) but drive check failed (value: [drive_value])"
          * If outcome.theatrical === false:
            - Apply contingencies normally

        - Action-to-emotion mapping: src/drive-engine/constants/action-emotions.ts
          * Map from action type (stored in WKG) to emotional expression
          * Mapping: { action_id: 'speak_curiously', emotion: 'curiosity', expression_type: 'pressure', threshold: 0.2 }
          * expression_type: 'pressure' (drive > threshold) or 'relief' (drive < threshold)
          * Extensible: new actions can be added without code changes

        Integration with Communication (E6):
        - Communication should pre-flight check (prevent theatrical responses)
        - Drive Engine backstops with post-flight enforcement (zero reinforcement)
        - Combined approach: E6 prevents, E4 punishes if prevention fails

        Test coverage:
        - Unit: Action-to-emotion mapping, drive threshold check
        - Integration: Theatrical actions receive zero reinforcement
        - Behavioral: System learns not to express low-drive emotions

      acceptance_criteria:
        - "Theater detection identifies emotional expressions with directional type (pressure vs. relief)"
        - "Drive state snapshot recorded at action selection time"
        - "Theatrical pressure expressions (drive <= 0.2) receive zero reinforcement (all contingencies = 0)"
        - "Theatrical relief expressions (drive >= 0.3) receive zero reinforcement (all contingencies = 0)"
        - "Non-theatrical actions receive normal contingencies"
        - "Theater events logged with action, emotion, expression type, and drive value"
        - "Action-to-emotion mapping extensible (no hardcoded lists)"
        - "npx tsc --noEmit passes"

