          * **Guilt Repair:** Acknowledgment -0.10, change -0.15, both -0.30. ✓
          * **Social Comment:** 30s window, guardian response → +0.10 satisfaction + -0.15 social. ✓
          * **Curiosity:** New nodes → relief proportional to gain. Revisit known = 0 relief. ✓

