epic: 8
title: "Planning (Opportunity-to-Procedure Pipeline)"
phase: 1
created: 2026-03-29
status: complete

tickets:
  - id: E8-T001
    meta:
      title: "Planning Types & Interface Definitions"
      description: |
        Define all types and interfaces for the Planning subsystem. This ticket grounds all
        subsequent work — every other ticket imports from these types.

        Deliverables:
        - Opportunity type (id, context fingerprint, priority, source event, classification)
        - OpportunityPriority type (initial priority, current priority, enqueued timestamp)
        - ResearchResult type (event patterns, failures, discrepancies, evidence strength, prior attempts)
        - SimulatedOutcome type (action, predicted drive effects, success probability, information gain, expected value)
        - SimulationResult type (simulations array, hasViableOutcome, bestCandidate)
        - PlanProposal type (id, opportunity ref, description, procedure spec, evidence strength, complexity)
        - ActionStep type (order, action, expected duration, dependsOn, fallback)
        - ContextFingerprint type (primary entity, secondary entities, situational factors)
        - PredictedOutcome type (drive effects, expected duration, confidence)
        - AbortCondition type (condition, threshold, action)
        - ValidationResult type (passes, failures, checked constraints, suggested revisions)
        - ConstraintCheckResult type (constraint name, passes, details)
        - CreatedProcedure type (id, confidence, status)
        - PlanEvaluation type (MAE, success, failure, new confidence)
        - PlanningResult discriminated union (CREATED | RATE_LIMITED | INSUFFICIENT_EVIDENCE | NO_VIABLE_OUTCOME | VALIDATION_FAILED)
        - PlanningState type (queue size, active plans, rate limiter state, cold-start dampening)
        - ColdStartConfig type (threshold decisions, initial dampening, ramp type)
        - RateLimitConfig type (max plans/window, window duration, max active, max tokens/plan)
        - QueueConfig type (max size, decay rate/hour, min priority threshold)

        Interfaces:
        - IPlanningService: processOpportunity(), getState(), getOpportunityQueue()
        - IOpportunityResearchService: research(opportunity) -> ResearchResult
        - ISimulationService: simulate(research) -> SimulationResult
        - IPlanProposalService: propose(research, simulations) -> PlanProposal[], revise(proposal, feedback) -> PlanProposal
        - IConstraintValidationService: validate(proposal) -> ValidationResult
        - IProcedureCreationService: create(proposal, validation) -> CreatedProcedure
        - IPlanEvaluationService: evaluateExecution(procedureId, execution) -> PlanEvaluation
        - IOpportunityQueueService: enqueue(), dequeue(), getState(), size()
        - IPlanningRateLimiter: canProceed(), recordPlanCreated(), getState()

        DI Tokens:
        - PLANNING_SERVICE, OPPORTUNITY_QUEUE, PLANNING_RATE_LIMITER
        - OPPORTUNITY_RESEARCH_SERVICE, SIMULATION_SERVICE
        - PLAN_PROPOSAL_SERVICE, CONSTRAINT_VALIDATION_SERVICE
        - PROCEDURE_CREATION_SERVICE, PLAN_EVALUATION_SERVICE

      acceptance_criteria:
        - "All interfaces compile with npx tsc --noEmit"
        - "Every type has JSDoc with CANON reference where applicable"
        - "PlanningResult is a discriminated union with exhaustive status variants"
        - "Provenance field present on CreatedProcedure (LLM_GENERATED)"
        - "Confidence field on CreatedProcedure defaults to 0.35"
        - "No use of 'any' type"
        - "All DI tokens defined as symbols"
        - "Config types have class-validator decorators"
    agents: [planner, forge]
    model: sonnet
    dependencies: []
    complexity: M

