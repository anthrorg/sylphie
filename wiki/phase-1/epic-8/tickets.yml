  - id: E8-T019
    meta:
      title: "Integration Test: Attractor State Prevention"
      description: |
        Tests that verify Planning Runaway and Prediction Pessimist prevention.

        Planning Runaway test:
        - Submit 10 Opportunities in rapid succession
        - Verify: only 3 plans created in first hour (rate limit)
        - Verify: PLANNING_RATE_LIMITED events emitted for blocked attempts
        - Verify: active plan count stays within limit
        - Verify: queue handles overflow correctly (eviction)

        Prediction Pessimist test:
        - Set totalDecisions = 5 (early operation)
        - Submit Opportunities with prediction failures
        - Verify: cold-start dampening reduces Opportunity priority by ~76%
        - Verify: fewer plans created than would be without dampening
        - Verify: created procedures start at 0.35, not higher
        - Set totalDecisions = 150 (past threshold)
        - Verify: no dampening applied, normal operation

        Queue stability test:
        - Fill queue to max (50)
        - Advance time by 24 hours
        - Verify: most items decayed below threshold and pruned
        - Verify: queue does not grow unboundedly

      acceptance_criteria:
        - "Rate limiter prevents more than 3 plans per hour"
        - "Cold-start dampening active in early operation"
        - "Cold-start dampening inactive after threshold"
        - "Queue decays and prunes correctly over time"
        - "No Planning Runaway under burst load"
        - "No Prediction Pessimist in early operation"
