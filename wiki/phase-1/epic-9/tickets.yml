    agents: [forge]
    model: sonnet
    dependencies: [E9-T003]
    complexity: S

  - id: E9-T011
    meta:
      title: "ConversationGateway (Real-Time Chat)"
      description: |
        Implement the bidirectional conversation WebSocket gateway for real-time chat
        between guardian and Sylphie.

        Gateway: @WebSocketGateway with path /ws/conversation

        Incoming messages (guardian → Sylphie):
        - type: 'message' — text input from guardian
        - type: 'feedback' — correction/confirmation of Sylphie's response

        All incoming messages routed through CommunicationService.handleGuardianInput().
        ConversationGateway NEVER processes content directly (CANON: Communication routing).

        Outgoing messages (Sylphie → guardian):
        - type: 'response' — Sylphie's reply with theaterCheck, metadata
        - type: 'drive-update' — periodic drive state for dashboard display
        - type: 'system' — connection status, errors

        Theater Prohibition enforcement:
        - Every 'response' message includes theaterCheck field
        - Drive state included for frontend correlation display

        Session management:
        - Track active sessions per connection
        - On connect: send current drive state + last N messages as snapshot
        - On disconnect: notify CommunicationService of session end

        Guardian feedback handling:
        - 'correction' feedback carries 3x weight (Guardian Asymmetry)
        - 'confirmation' feedback carries 2x weight
        - Both routed through CommunicationService for proper processing

      acceptance_criteria:
        - "Gateway listens on /ws/conversation"
        - "Incoming messages routed through CommunicationService"
        - "Gateway does NOT process content directly"
        - "Outgoing responses include theaterCheck result"
        - "Drive state included in outgoing messages"
        - "Guardian feedback type detected and routed correctly"
        - "Session tracking on connect/disconnect"
        - "Snapshot sent on initial connection (drive state + recent messages)"
        - "Error handling: invalid messages return error frames, don't crash"
    agents: [vox, forge]
    model: sonnet
    dependencies: [E9-T003]
    complexity: L

  - id: E9-T012
    meta:
      title: "VoiceController (STT/TTS HTTP Endpoints)"
      description: |
        Implement HTTP endpoints for voice input/output. Logic delegates to
        Communication module services.

        Endpoints:
        - POST /api/voice/transcribe — Upload audio, return transcription
          - Accepts: multipart/form-data with audio file
          - Delegates to ISttService.transcribe()
          - Returns: { text, confidence, latency_ms }
        - POST /api/voice/synthesize — Text to speech audio
          - Accepts: { text: string }
          - Delegates to ITtsService.synthesize()
          - Returns: audio/mpeg stream

        Error handling:
        - STT failure: return degradation message suggesting text input
        - TTS failure: return text-only response
        - Both per Vox's "never block on audio failure" rule

      acceptance_criteria:
        - "POST /api/voice/transcribe accepts audio upload"
        - "POST /api/voice/synthesize returns audio stream"
        - "Both delegate to Communication module services"
        - "STT failure returns graceful degradation response"
        - "TTS failure returns text-only fallback"
        - "Latency tracked and included in response"
    agents: [vox, forge]
    model: sonnet
    dependencies: [E9-T002]
    complexity: S

  - id: E9-T013
    meta:
      title: "Exception Filters (HTTP + WebSocket)"
      description: |
        Implement global exception filters for both HTTP and WebSocket contexts.

        HTTP Exception Filter:
        - Catches SylphieException and all subclasses
        - Maps domain exceptions to appropriate HTTP status codes:
          - NodeNotFoundError → 404
          - InvalidSessionError → 401
          - GraphQueryTimeoutError → 504
          - WebException → 400
          - Unknown SylphieException → 500
        - Error responses never leak sensitive details (stack traces, DB queries)
        - Structured error response: { error: string, message: string, statusCode: number }

        WebSocket Exception Filter:
        - Catches exceptions during WebSocket message handling
        - Sends error frame to client: { type: 'error', error: string, code: string }
        - Does NOT close the WebSocket connection on recoverable errors
        - Logs all errors with context

        Development mode:
        - In development mode, include additional debug info in error responses
        - In production mode, generic error messages only

      acceptance_criteria:
        - "HTTP filter maps domain exceptions to correct status codes"
        - "Error responses have consistent structure"
        - "No stack traces or DB queries in production error responses"
        - "WebSocket filter sends error frames, doesn't crash connection"
        - "Development mode includes extra debug info"
        - "All exceptions logged with context"
    agents: [forge]
    model: sonnet
    dependencies: [E9-T002]
    complexity: S

