  - id: E7-T012
    meta:
      title: "Pattern Generalization + Symbolic Decomposition Jobs"
      description: |
        Port v1 PatternGeneralizationJob and SymbolicDecompositionJob. Identifies sibling
        phrase clusters and proposes ConceptPrimitive abstractions. Decomposes phrases at
        word level into semantic units.

        Design:
        - PatternGeneralizationJob implements ILearningJob interface
        - shouldRun(): boolean checks if sufficient phrase clusters available
        - run(): Promise<JobResult> executes pattern generalization
        - Identify sibling phrase clusters:
          * Phrases that share FOLLOWS_PATTERN edges (same template)
          * Example: "I like cats", "I like dogs", "I like pizza" all follow "I like X"
          * Cluster by shared template and structural similarity
        - LLM-assisted ConceptPrimitive proposal:
          * For each cluster: identify common semantic concept
          * Propose ConceptPrimitiveNode: "LIKING" concept
          * Connect original phrases via HAS_INSTANCE edges
          * Assign confidence to concept (0.3-0.7)
        - Validation before commit:
          * Concept must apply to >= 80% of cluster phrases
          * If validation fails: don't commit, may retry with lower threshold later
        - Commit validated concepts to WKG:
          * Create ConceptPrimitiveNode with LLM_GENERATED provenance at 0.35
          * Link cluster phrases via HAS_INSTANCE edges
          * Concepts eligible for Type 1 graduation

        SymbolicDecompositionJob (internal, executes after generalization):
        - shouldRun(): checks if phrases available for decomposition
        - run(): decomposes phrases at word level
        - Word-level decomposition via sub-services:
          * Identify semantic units (words/tokens with distinct meaning)
          * Create WordNode for each unit
          * Link phrase to words via CONTAINS_WORD edges
          * Create word-level relationships (HOW_WORDS_RELATE)
        - Example: "happy cat" → happy(adjective), cat(noun), MODIFIES(happy→cat)
        - Word decomposition enables later pattern matching at finer granularity
        - All word nodes and edges carry appropriate provenance
        - Cost tracking: LLM calls and latency

        CANON constraints:
        - All proposals validated before committing to WKG
        - Concept validation >= 80% cluster coverage
        - Provenance tracked on all new nodes/edges

        v1 reference: co-being/packages/learning/src/jobs/pattern-generalization.job.ts
        and symbolic-decomposition.job.ts (combine into single job for v2)

        Test coverage:
        - Phrase cluster identified by shared template
        - LLM proposes ConceptPrimitive for cluster
        - Validation checks >= 80% cluster coverage
        - Valid concept committed to WKG
        - Failed validation prevents commit
        - Word-level decomposition creates word nodes and relationships
        - All nodes/edges carry appropriate provenance
      acceptance_criteria:
        - "Implements ILearningJob (shouldRun(), run())"
        - "Identifies sibling phrase clusters by shared template"
        - "LLM-assisted ConceptPrimitive proposal"
        - "Validation before commit (>= 80% cluster coverage)"
        - "Concepts committed to WKG with LLM_GENERATED provenance at 0.35"
        - "Word-level decomposition creates semantic units"
        - "Word nodes and relationships created"
        - "Cost tracking recorded"
        - "JobResult returned with artifact count and latency"
    agents: [learning]
    model: sonnet
    dependencies: [E7-T009, E7-T011]
    complexity: M

  - id: E7-T013
    meta:
      title: "Provenance Health Metrics & Lesion Test"
      description: |
        Implement the provenance health assessment system and Lesion Test for evaluating
        knowledge quality and reducing LLM dependency.

        Design:
        - ProvenanceHealthService computes health metrics on demand
        - computeHealth(scope: 'GLOBAL' | 'MODULE' | 'ENTITY'): ProvenanceHealth
        - Three key metrics:
          1. Experiential ratio: (SENSOR + GUARDIAN edges) / total edges
             * High ratio (>0.6) = knowledge grounded in experience/guidance
             * Low ratio (<0.3) = knowledge depends heavily on inference
          2. LLM dependency ratio: LLM_GENERATED edges / total edges
             * High ratio (>0.7) = system may be hallucinating knowledge
             * Low ratio (<0.3) = good balance with other provenance sources
          3. Guardian ratio: GUARDIAN edges / total edges
             * Indicates how much knowledge is explicitly taught vs inferred
             * Target: >= 0.15 (at least 15% explicitly taught)

        - Health status classification:
          * HEALTHY: experiential > 0.6 AND llm_dependency < 0.5 AND guardian >= 0.15
          * DEVELOPING: intermediate values (trending toward healthy)
          * UNHEALTHY: experiential < 0.3 OR llm_dependency > 0.7 OR guardian < 0.05

        - Lesion Test query (CANON verification tool):
          * Query: what knowledge remains without LLM_GENERATED edges?
          * Execute: WKG query excluding all edges with LLM_GENERATED provenance
          * Result: subgraph of "hard knowledge" (experiential + guardian)
          * Metric: lesion_size / full_graph_size = resilience ratio
          * Target: >= 0.4 (at least 40% survives lesion)

        - Periodic metrics emission:
          * Emit PROVENANCE_HEALTH event to TimescaleDB every N cycles (configurable, default 10)
          * Event includes: overall health status, all three ratios, lesion resilience
          * Trend tracking: compare across cycles to detect drift

        - API endpoint for metrics dashboard:
          * GET /api/learning/health → returns current ProvenanceHealth + trends
          * GET /api/learning/lesion-test → executes lesion test, returns subgraph
          * Used by dashboard to visualize knowledge quality over time

        - Integration with Information Integrity drive:
          * Low health status may trigger Information Integrity pressure
          * Guardian teaching may increase health status and resolve pressure

        CANON constraints:
        - Lesion Test is non-destructive (read-only, doesn't modify WKG)
        - Provenance distinctions never erased (fundamental to Lesion Test)
        - Health assessment informs drive state (separate epic for drive integration)

        Test coverage:
        - Compute health metrics correctly
        - Classify health status (HEALTHY/DEVELOPING/UNHEALTHY)
        - Execute Lesion Test query
        - Compute resilience ratio
        - Emit metrics events to TimescaleDB
        - API endpoints return correct data
        - Trends tracked across cycles
      acceptance_criteria:
        - "Compute experiential ratio (SENSOR + GUARDIAN / total)"
        - "Compute LLM dependency ratio (LLM_GENERATED / total)"
        - "Compute guardian ratio (GUARDIAN / total)"
        - "Classify health: HEALTHY (exp > 0.6, llm < 0.5, guard >= 0.15), DEVELOPING, UNHEALTHY"
        - "Lesion Test query excludes LLM_GENERATED edges"
        - "Compute resilience ratio (lesion_size / full_size)"
        - "Emit PROVENANCE_HEALTH events to TimescaleDB"
        - "API endpoints for health metrics and Lesion Test"
        - "Trend tracking across cycles"
    agents: [learning, sentinel]
    model: sonnet
    dependencies: [E7-T006, E7-T007]
    complexity: M

  - id: E7-T014
    meta:
      title: "Learning Job Registry & Orchestration"
      description: |
        Implement the job registry pattern that manages all 7 learning jobs and executes
        them in correct dependency order during the maintenance cycle.

        Design:
        - JobRegistry service maintains list of all learning jobs
        - Jobs registered at startup:
          1. TemporalPatternJob (E7-T008)
          2. ProcedureFormationJob (E7-T009)
          3. CorrectionProcessingJob (E7-T010)
          4. SentenceProcessingJob (E7-T011)
          5. PatternGeneralizationJob (E7-T012)
          6. SymbolicDecompositionJob (E7-T012)
        - Dependency ordering enforced by registry:
          * Job can only run if its dependencies completed successfully in current cycle
          * Example: ProcedureFormationJob depends on TemporalPatternJob (needs RESPONSE_TO edges)
          * Example: PatternGeneralizationJob depends on SentenceProcessingJob (needs sentence templates)
        - Per-job shouldRun() gating:
          * Each job checks if preconditions met before execution
          * Example: TemporalPatternJob.shouldRun() checks if events in batch
          * Example: ProcedureFormationJob.shouldRun() checks if RESPONSE_TO edges created
          * Prevents unnecessary work if conditions not met
        - Per-job error isolation:
          * One job failure doesn't kill the maintenance cycle
          * If job.run() throws: catch error, emit JOB_FAILED event, continue to next job
          * All job errors logged to TimescaleDB for debugging
          * Cycle continues and completes, reports which jobs failed
        - Job execution metrics:
          * Track per-job latency
          * Track artifacts created per job (edges created, nodes created)
          * Track errors per job
          * All metrics logged to TimescaleDB as JOB_EXECUTION events
        - Cycle completion:
          * After all jobs complete: emit MAINTENANCE_CYCLE_COMPLETE with final metrics
          * Report total time, total artifacts, any failures
          * Update cycle count in system state

        - Orchestration flow (called by MaintenanceCycleService):
          1. Call registry.executeJobsForCycle()
          2. For each job in dependency order:
             a. Check job.shouldRun() → if false, skip
             b. Try: result = job.run()
             c. Catch: log error, continue
             d. Emit JOB_EXECUTION event with result/error
          3. Return final cycle metrics
          4. MaintenanceCycleService emits MAINTENANCE_CYCLE_COMPLETE

        CANON constraints:
        - All jobs implement ILearningJob interface
        - Dependency order enforced
        - Error isolation prevents cascading failures
        - All execution metrics tracked

        Test coverage:
        - All jobs registered at startup
        - Dependency order respected (second job waits for first)
        - shouldRun() gating prevents unnecessary execution
        - Job failure caught, cycle continues
        - Metrics correctly computed per job
        - Final cycle metrics aggregated
      acceptance_criteria:
        - "All 7 jobs registered with dependency order"
        - "Each job checked via shouldRun() before execution"
        - "Job failures isolated (one failure doesn't kill cycle)"
        - "Per-job execution metrics tracked (latency, artifacts, errors)"
        - "JOB_EXECUTION events emitted to TimescaleDB"
        - "Dependency order enforced (job N waits for job N-1)"
        - "Cycle completes even if some jobs fail"
        - "Final cycle metrics aggregated and reported"
    agents: [learning, forge]
    model: sonnet
    dependencies: [E7-T008, E7-T009, E7-T010, E7-T011, E7-T012]
    complexity: M

  - id: E7-T015
    meta:
      title: "Integration Testing & Verification"
      description: |
        Integration tests verifying the Learning subsystem works end-to-end and respects
        all CANON constraints.

        Test suites:

        1. End-to-End Event Consolidation:
        - Learnable event → consolidation cycle → WKG growth
        - Verify events marked as has_learnable=true are processed
        - Verify entities extracted from events
        - Verify edges created between entities
        - Verify all new graph content carries appropriate provenance

        2. Max 5 Events Per Cycle:
        - Create batch of 10 learnable events
        - Run consolidation cycle
        - Verify exactly 5 events processed (or fewer if fewer available)
        - Verify remaining 5 available for next cycle
        - Hard ceiling enforcement verified

        3. Provenance Tagging:
        - Guardian correction event → extracted entities/edges marked GUARDIAN provenance
        - SENSOR observation → SENSOR provenance
        - LLM inference → LLM_GENERATED provenance
        - Verify all new graph content carries correct provenance source
        - Verify provenance never erased in subsequent operations

        4. Confidence Ceiling Enforcement:
        - Extract new entities/edges from LLM inference
        - Verify confidence <= 0.60 (LLM_GENERATED at 0.35 base)
        - Verify GUARDIAN edges at 0.60 base
        - Verify no entity/edge initially exceeds ceiling
        - Verify no automatic graduation without retrieval-and-use

        5. Contradiction Detection:
        - Create conflicting entities/edges in consolidation batch
        - Run consolidation → detect contradictions
        - Verify all 4 contradiction types detected
        - Verify GUARDIAN edges never overwritten (surface to guardian)
        - Verify CONTRADICTION_DETECTED events emitted
        - Verify Information Integrity drive relief computed

        6. Guardian Asymmetry:
        - Guardian correction event (3x weight)
        - Guardian confirmation event (2x weight)
        - LLM inference event (1x weight)
        - Verify weights applied correctly in confidence/reinforcement
        - Verify guardian feedback outweighs algorithmic evaluation

        7. Lesion Test:
        - Build knowledge graph with mixed provenance
        - Run Lesion Test query (exclude LLM_GENERATED)
        - Verify resilience ratio computed (lesion_size / full_size)
        - Verify target >= 0.4 for healthy knowledge
        - Verify trend tracking across cycles

        8. Type 2 Cost Tracking:
        - Each consolidation cycle involves LLM calls (extraction, refinement, proposal)
        - Verify costs tracked and emitted to TimescaleDB
        - Verify latency and token counts recorded
        - Verify cost metrics informable for Type 1 graduation decisions

        9. Job Orchestration:
        - Run maintenance cycle
        - Verify all applicable jobs executed in dependency order
        - Verify job metrics emitted to TimescaleDB
        - Verify one job failure doesn't kill cycle
        - Verify cycle completes with final metrics

        10. Attractor State Prevention:
        - Verify no path exists for Learning to write to Drive Engine evaluation
        - Verify no path for WKG to write to Self KG (isolation)
        - Verify no path for Learning to modify drive rules
        - Verify one-way communication (read drive, write events)

        Deliverables:
        - Integration test suite covering all 10 areas (e.g., test/integration/learning.spec.ts)
        - End-to-end test with sample learnable events
        - Provenance chain audit (verify no provenance erased)
        - Confidence ceiling audit (verify no ceiling violations)
        - Type 2 cost report (total LLM calls, token usage, latency)
        - Lesion Test results and resilience metrics
        - Job orchestration metrics

        Acceptance criteria:
        - "All 10 test areas pass"
        - "Max 5 events per cycle enforced (hard ceiling)"
        - "Provenance tagging correct on all extracted entities/edges"
        - "Confidence ceiling enforced (no entity/edge > 0.60 initial)"
        - "All 4 contradiction types detected"
        - "GUARDIAN edges never overwritten (surface to guardian)"
        - "Guardian Asymmetry enforced (3x corrections, 2x confirmations)"
        - "Lesion Test executed, resilience ratio >= 0.4 for healthy"
        - "All Type 2 costs tracked and reported"
        - "Job orchestration respects dependency order"
        - "One job failure doesn't kill cycle"
        - "No CANON violations in any test path"
        - "npx tsc --noEmit passes"
    agents: [learning, forge]
    model: sonnet
    dependencies: [E7-T013, E7-T014]
    complexity: M
