tickets:
  - id: E7-T001
    meta:
      title: "Learning Types & Interface Refinement"
      description: |
        Refine E0 stub interfaces for real implementation. Define all types needed across the
        Learning subsystem: ConsolidationResult, ConsolidationBatch, ExtractedEntity,
        EntityResolution, ExtractedEdge, Contradiction, ContradictionType, ContradictionResolution,
        JobResult, LearningCycleMetrics, ProvenanceHealth, and SalienceScore.

        This ticket grounds all subsequent work. Every other ticket imports from these types.

        Deliverables:
        - Refined ILearningService interface with full method signatures
        - Refined IEntityExtractionService interface
        - Refined IEdgeRefinementService interface
        - Refined IContradictionDetector interface
        - ILearningJob interface (shouldRun(), run() → JobResult)
        - IConsolidationService interface (selectBatch, consolidate)
        - IEventRankerService interface (rankBySalience)
        - IMaintenanceCycleService interface (cycle orchestration)
        - ConsolidationResult type with entity/edge extraction results
        - ConsolidationBatch type with salience-ranked events
        - ExtractedEntity type with provenance, base confidence, resolution status
        - EntityResolution enum (EXACT_MATCH, FUZZY_MATCH, AMBIGUOUS, NEW)
        - ExtractedEdge type with relationship, confidence, provenance
        - Contradiction type with 4 conflict types (DIRECT, CONFIDENCE, SCHEMA, TEMPORAL)
        - ContradictionResolution enum (PREFER_GUARDIAN, MERGE, FLAG_AMBIGUOUS)
        - JobResult type (success, artifact count, issues, latency_ms)
        - LearningCycleMetrics type (cycle duration, events processed, entities extracted, edges refined, contradictions found)
        - ProvenanceHealth type (experiential_ratio, llm_dependency_ratio, guardian_ratio, health_status)
        - SalienceScore type (base_salience, recency_boost, total_score)

        Acceptance criteria:
        - "All interfaces compile with npx tsc --noEmit"
        - "Every type has JSDoc with CANON reference"
        - "Provenance field present on all entity/edge types"
        - "Base confidence assigned by provenance source (GUARDIAN 0.60, SENSOR 0.40, LLM_GENERATED 0.35, INFERENCE 0.30)"
        - "ILearningJob interface matches (shouldRun(): boolean, run(): Promise<JobResult>)"
        - "No use of 'any' type"
    agents: [learning, forge]
    model: sonnet
    dependencies: []
    complexity: M

